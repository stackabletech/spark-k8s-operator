---
apiVersion: secrets.stackable.tech/v1alpha1
kind: SecretClass
metadata:
  name: garage-tls-ca
spec:
  backend:
    autoTls:
      ca:
        secret:
          name: secret-provisioner-tls-ca
          namespace: default
        autoGenerate: true
---
apiVersion: secrets.stackable.tech/v1alpha1
kind: SecretClass
metadata:
  name: garage-credentials-class
spec:
  backend:
    k8sSearch:
      searchNamespace:
        pod: {}
---
apiVersion: v1
kind: Secret
metadata:
  name: garage-credentials
  labels:
    secrets.stackable.tech/class: garage-credentials-class
stringData:
  accessKey: spark
  secretKey: sparkspark

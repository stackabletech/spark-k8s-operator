---
apiVersion: v1
kind: Secret
metadata:
  name: minio-users
type: Opaque
stringData:
  username1: |
    username=spark
    password=sparkspark
    disabled=false
    policies=readwrite,consoleAdmin,diagnostics
    setPolicies=false
---
apiVersion: secrets.stackable.tech/v1alpha1
kind: SecretClass
metadata:
  name: minio-tls-ca
spec:
  backend:
    k8sSearch:
      searchNamespace:
        pod: {}
---
apiVersion: secrets.stackable.tech/v1alpha1
kind: SecretClass
metadata:
  name: minio-credentials-class
spec:
  backend:
    k8sSearch:
      searchNamespace:
        pod: {}
---
apiVersion: v1
kind: Secret
metadata:
  name: minio-credentials
  labels:
    secrets.stackable.tech/class: minio-credentials-class
stringData:
  accessKey: spark
  secretKey: sparkspark

---
apiVersion: v1
kind: Secret
metadata:
  name: s3-credentials
  labels:
    secrets.stackable.tech/class: spark-pi-private-s3-credentials-class
timeout: 240
stringData:
  accessKey: s3AccessKey
  secretKey: s3SecretKey
---
apiVersion: secrets.stackable.tech/v1alpha1
kind: SecretClass
metadata:
  name: spark-pi-private-s3-credentials-class
spec:
  backend:
    k8sSearch:
      searchNamespace:
        pod: {}

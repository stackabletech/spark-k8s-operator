---
# The Spark History Server is a read-only web UI that reads completed Spark event logs
# from a storage backend (S3 or HDFS). It receives all configuration via mounted volumes
# and does not call the Kubernetes API at runtime, so no additional rules are needed here.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: spark-history-clusterrole
  labels:
  {{- include "operator.labels" . | nindent 4 }}
rules:
{{ if .Capabilities.APIVersions.Has "security.openshift.io/v1" }}
  - apiGroups:
      - security.openshift.io
    resources:
      - securitycontextconstraints
    resourceNames:
      - nonroot-v2
    verbs:
      - use
{{ end }}

---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 900
---
# The Job starting the whole process
apiVersion: spark.stackable.tech/v1alpha1
kind: SparkApplication
metadata:
  name: spark-examples
status:
  phase: Succeeded
---
# Test that job affinities have been correctly added to the Job template
apiVersion: batch/v1
kind: Job
metadata:
  name: spark-examples
spec:
  template:
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - preference:
              matchExpressions:
              - key: disktype
                operator: In
                values:
                - ssd
            weight: 1

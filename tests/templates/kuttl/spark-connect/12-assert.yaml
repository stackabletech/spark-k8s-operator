      controller: true
      kind: SparkConnectServer
      name: spark-connect
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: server
      app.kubernetes.io/instance: spark-connect
      app.kubernetes.io/name: spark-connect
      app.kubernetes.io/role-group: default
status:
